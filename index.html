<!DOCTYPE html>
<html>
<head>
    <title>ChatBot App</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 350px;
            height: 500px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: #6c63ff;
            color: white;
            padding: 15px;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
            text-align: center;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background: #f1f1f1;
        }

        .message {
            padding: 8px 12px;
            margin: 5px;
            border-radius: 10px;
            display: inline-block;
            max-width: 70%;
        }

        .user {
            background: #6c63ff;
            color: white;
            align-self: flex-end;
            float: right;
            clear: both;
        }

        .bot {
            background: #e4e6eb;
            color: black;
            float: left;
            clear: both;
        }

        .chat-input {
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        .chat-input input {
            border-radius: 20px;
        }

        .chat-input button {
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="chat-container">

    <div class="chat-header">
        💬 ChatBot App
    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="chat-input d-flex">
        <input id="user" class="form-control me-2" placeholder="Name">
        <input id="msg" class="form-control me-2" placeholder="Type message">
        <button class="btn btn-primary" onclick="sendMsg()">Send</button>
    </div>

</div>

<script>
const API_URL = "Your api key";

function sendMsg() {
    const user = document.getElementById("user").value;
    const message = document.getElementById("msg").value;

    if (!message) return;

    fetch(API_URL + "/send", {
        method: "POST",
        body: JSON.stringify({ user, message })
    })
    .then(res => res.json())
    .then(() => {
        document.getElementById("msg").value = "";
        loadMessages();
    });
}

function loadMessages() {
    fetch(API_URL + "/messages")
    .then(res => res.json())
    .then(data => {
        const chatBox = document.getElementById("chatBox");
        chatBox.innerHTML = "";

        data.forEach(item => {
            const div = document.createElement("div");
            div.classList.add("message");

            if (item.user === "Bot") {
                div.classList.add("bot");
            } else {
                div.classList.add("user");
            }

            div.innerText = item.user + ": " + item.message;
            chatBox.appendChild(div);
        });

        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

// Auto refresh
setInterval(loadMessages, 3000);
</script>

</body>
</html>
